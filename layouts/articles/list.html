{{ define "title" }}Articles — {{ site.Title }}{{ end }}

{{ define "main" }}
  <section class="hero hero--page" aria-labelledby="articles-heading">
    <img src="/assets/images/placeholders/hero-articles.svg"
         alt=""
         class="hero__image"
         fetchpriority="high"
         decoding="async">
    <div class="hero__content">
      <h1 class="hero__heading" id="articles-heading">Articles</h1>
    </div>
  </section>

  <div class="column">

    <div class="filters" role="group" aria-label="Filter articles by category">
      <button type="button" class="filter-chip" data-filter="all"           aria-pressed="true">All</button>
      <button type="button" class="filter-chip" data-filter="Project"       aria-pressed="false">Projects</button>
      <button type="button" class="filter-chip" data-filter="Data Analysis" aria-pressed="false">Data Analysis</button>
      <button type="button" class="filter-chip" data-filter="Essay"         aria-pressed="false">Essays</button>
    </div>

    <div id="articles-list">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="list-row" data-tag="{{ .Params.tag }}">
        <div class="list-row__date">{{ .Date.Format "2 Jan 2006" }}</div>
        <h3 class="list-row__title">{{ .Title }}</h3>
        <span class="tag list-row__tag">{{ .Params.tag }}</span>
      </a>
      {{ end }}
    </div>

    <p id="articles-empty" class="bio" hidden>No articles in this category yet.</p>

  </div>
{{ end }}

{{ define "scripts" }}
  <script src="/assets/js/filters.js" defer></script>
{{ end }}
