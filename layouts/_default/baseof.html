<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#F8F7F3" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#15140F" media="(prefers-color-scheme: dark)">

  <title>{{- block "title" . }}{{ .Title }} — {{ site.Title }}{{ end -}}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">

  {{- block "meta-social" . }}
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.Title }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }} — {{ site.Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta property="og:image" content="{{ site.BaseURL }}assets/images/og/default.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }} — {{ site.Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ site.BaseURL }}assets/images/og/default.png">
  {{- end }}

  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="alternate" type="application/rss+xml" title="{{ site.Title }}" href="/feed.xml">

  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        if (saved === 'light' || saved === 'dark') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap">

  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
</head>
<body>

  <a href="#main" class="skip-link">Skip to content</a>

  {{ partial "nav.html" . }}

  <main class="site-main" id="main">
    {{- block "main" . }}{{- end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="/assets/js/theme.js" defer></script>
  {{- block "scripts" . }}{{- end }}

</body>
</html>
